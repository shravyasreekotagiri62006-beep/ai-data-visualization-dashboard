<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DataViz - Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
        }
        .auth-card {
            width: 400px;
            padding: 2.5rem;
            text-align: center;
        }
        .auth-logo { font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem; }
        .auth-form { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
        .auth-form input {
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.5);
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
        }
        .auth-btn { width: 100%; margin-top: 1rem; padding: 1rem; }
        .auth-error { color: var(--danger); font-size: 0.9rem; margin-top: 1rem; font-weight: 500;}
        .auth-switch { margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .auth-switch a { color: var(--primary-color); text-decoration: none; font-weight: 600;}
    </style>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="auth-container">
        <div class="auth-card glass-panel">
            <i class="fa-solid fa-chart-pie auth-logo"></i>
            <h2 style="color:var(--text-main)">{{ 'Register' if mode == 'register' else 'Welcome Back' }}</h2>
            <p style="color:var(--text-muted)">Secure AI Data Intelligence Platform</p>
            
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form class="auth-form" method="POST" action="{{ url_for(mode) }}">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-primary auth-btn">{{ 'Create Account' if mode == 'register' else 'Log In' }}</button>
            </form>

            <div class="auth-switch">
                {% if mode == 'login' %}
                Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
                {% else %}
                Already have an account? <a href="{{ url_for('login') }}">Log in</a>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
